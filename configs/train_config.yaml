dev_mode: true   # set to false (and dev_sample: null) for a full production run

data:
  raw_train: data/raw/train.csv
  raw_test: data/raw/test.csv
  target_column: Irrigation_Need
  label_map:
    Low: 0
    Medium: 1
    High: 2
  processed_dir: data/processed
  dev_sample: 10000      # stratified rows to keep from train; null = full data
  dev_test_sample: 5000  # rows to keep from test; null = full data

training:
  seed: 42
  n_splits: 3   # 5 for full run
  # Comment out any model to skip it. Order controls execution order.
  models:
    - xgb
    - lgbm
    - catboost

# ── Model hyperparameters (used by baseline_runner; expand in Week 2) ───────

lightgbm:
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8

xgboost:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 20

catboost:
  iterations: 1000
  learning_rate: 0.05
  depth: 6
  l2_leaf_reg: 3

mlflow:
  experiment_name: irrigation-need
  tracking_uri: mlruns
