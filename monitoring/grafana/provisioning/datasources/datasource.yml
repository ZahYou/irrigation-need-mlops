apiVersion: 1

# Auto-provisions the Prometheus datasource on Grafana startup,
# so you don't have to add it by hand in the UI.
datasources:
  - name: Prometheus
    uid: prometheus               # pinned so provisioned dashboards can reference it
    type: prometheus
    access: proxy
    url: http://prometheus:9090   # "prometheus" = compose service name
    isDefault: true
    editable: true
